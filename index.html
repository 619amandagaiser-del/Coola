<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Starship</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

nav{
background:#000;
padding:10px;
display:flex;
gap:10px;
}

button{
background:#222;
border:none;
color:white;
padding:8px 12px;
cursor:pointer;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}
</style>

</head>
<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('games')">Games</button>
<button onclick="showPage('tv')">TV</button>
<button onclick="showPage('profile')">Profile</button>
<button onclick="showPage('settings')">Settings</button>
</nav>

<div id="home" class="page active">
<h1>Welcome to Starship</h1>
</div>

<div id="games" class="page">
<h1>Games</h1>
</div>

<div id="tv" class="page">
<h1>TV</h1>
</div>

<div id="profile" class="page">
<h1>Profile</h1>
</div>

<div id="settings" class="page">
<h1>Settings</h1>
</div>

<script>
function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}
</script>

</body>
</html>
