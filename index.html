<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Starship Infinity</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050915;
color:white;
overflow:hidden;
}

/* desktop */

#desktop{
position:absolute;
top:0;
left:0;
right:0;
bottom:50px;
padding:20px;
}

/* icons */

.icon{
display:inline-block;
width:90px;
text-align:center;
margin:12px;
cursor:pointer;
}

/* taskbar */

#taskbar{
position:absolute;
bottom:0;
left:0;
right:0;
height:50px;
background:#0c1022;
display:flex;
align-items:center;
gap:10px;
padding:6px;
}

#search{
padding:6px;
border-radius:5px;
border:none;
}

/* windows */

.window{
position:absolute;
width:680px;
height:420px;
background:#121633;
border:1px solid #333;
border-radius:8px;
display:none;
flex-direction:column;
}

.titlebar{
background:#1b2050;
padding:8px;
display:flex;
justify-content:space-between;
cursor:move;
}

.controls button{
background:#333;
margin-left:5px;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

/* ui */

button{
padding:6px 10px;
border:none;
background:#3d4fc7;
color:white;
border-radius:5px;
cursor:pointer;
}

input,textarea{
padding:6px;
border:none;
border-radius:4px;
}

iframe{
width:100%;
height:100%;
border:none;
}

canvas{
border:1px solid white;
}

/* notifications */

#notify{
position:absolute;
top:10px;
right:10px;
background:#1b2050;
padding:10px;
border-radius:6px;
display:none;
}

</style>
</head>

<body>

<div id="notify"></div>

<div id="desktop">

<div class="icon" onclick="openApp('games')">🎮<div>Games</div></div>
<div class="icon" onclick="openApp('browser')">🌐<div>Browser</div></div>
<div class="icon" onclick="openApp('notes')">📝<div>Notes</div></div>
<div class="icon" onclick="openApp('music')">🎵<div>Music</div></div>
<div class="icon" onclick="openApp('bookmarks')">⭐<div>Bookmarks</div></div>
<div class="icon" onclick="openApp('draw')">🎨<div>Draw</div></div>
<div class="icon" onclick="openApp('drive')">📁<div>Drive</div></div>
<div class="icon" onclick="openApp('system')">📊<div>System</div></div>

</div>

<div id="taskbar">

🚀 Starship Infinity

<input id="search" placeholder="Search apps">

</div>

<!-- browser -->

<div class="window" id="browser">

<div class="titlebar">

Browser

<div class="controls">
<button onclick="minimize(this)">_</button>
<button onclick="closeWin(this)">X</button>
</div>

</div>

<div class="content">

<input id="url">
<button onclick="go()">Go</button>

<iframe id="web"></iframe>

</div>

</div>

<!-- games -->

<div class="window" id="games">

<div class="titlebar">

Games

<div class="controls">
<button onclick="minimize(this)">_</button>
<button onclick="closeWin(this)">X</button>
</div>

</div>

<div class="content">

<button onclick="play('https://playsnake.org')">Snake</button>
<button onclick="play('https://tetris.com/play-tetris')">Tetris</button>

<iframe id="gameFrame"></iframe>

</div>

</div>

<!-- notes -->

<div class="window" id="notes">

<div class="titlebar">

Notes

<div class="controls">
<button onclick="minimize(this)">_</button>
<button onclick="closeWin(this)">X</button>
</div>

</div>

<div class="content">

<textarea id="noteArea" style="width:100%;height:80%"></textarea>

</div>

</div>

<!-- music -->

<div class="window" id="music">

<div class="titlebar">

Music

<div class="controls">
<button onclick="minimize(this)">_</button>
<button onclick="closeWin(this)">X</button>
</div>

</div>

<div class="content">

<audio controls>
<source src="">
</audio>

</div>

</div>

<!-- bookmarks -->

<div class="window" id="bookmarks">

<div class="titlebar">

Bookmarks

<div class="controls">
<button onclick="minimize(this)">_</button>
<button onclick="closeWin(this)">X</button>
</div>

</div>

<div class="content">

<input id="bm">
<button onclick="addBookmark()">Add</button>

<div id="bmlist"></div>

</div>

</div>

<!-- draw -->

<div class="window" id="draw">

<div class="titlebar">

Draw

<div class="controls">
<button onclick="minimize(this)">_</button>
<button onclick="closeWin(this)">X</button>
</div>

</div>

<div class="content">

<canvas id="canvas" width="500" height="300"></canvas>

</div>

</div>

<!-- drive -->

<div class="window" id="drive">

<div class="titlebar">

Drive Viewer

<div class="controls">
<button onclick="minimize(this)">_</button>
<button onclick="closeWin(this)">X</button>
</div>

</div>

<div class="content">

<input id="driveLink" placeholder="Drive link">
<button onclick="openDrive()">Open</button>

<iframe id="driveFrame"></iframe>

</div>

</div>

<!-- system -->

<div class="window" id="system">

<div class="titlebar">

System Info

<div class="controls">
<button onclick="minimize(this)">_</button>
<button onclick="closeWin(this)">X</button>
</div>

</div>

<div class="content">

<p id="info"></p>

</div>

</div>

<script>

/* notifications */

function notify(msg){
let n=document.getElementById("notify")
n.innerText=msg
n.style.display="block"
setTimeout(()=>n.style.display="none",3000)
}

/* open window */

function openApp(id){
let w=document.getElementById(id)
w.style.display="flex"
w.style.left="150px"
w.style.top="120px"
notify(id+" opened")
}

/* window controls */

function closeWin(btn){
btn.closest(".window").style.display="none"
}

function minimize(btn){
btn.closest(".window").style.display="none"
}

/* browser */

function go(){
let q=document.getElementById("url").value
if(!q.startsWith("http"))
q="https://www.google.com/search?q="+q
document.getElementById("web").src=q
}

/* games */

function play(url){
document.getElementById("gameFrame").src=url
}

/* notes autosave */

let note=document.getElementById("noteArea")

note.value=localStorage.getItem("notes")||""

note.oninput=()=>{
localStorage.setItem("notes",note.value)
}

/* bookmarks */

function addBookmark(){

let url=document.getElementById("bm").value
let list=document.getElementById("bmlist")

list.innerHTML+="<div>"+url+"</div>"

}

/* drive */

function openDrive(){

let link=document.getElementById("driveLink").value
let id=link.split("/d/")[1]?.split("/")[0]

let embed="https://drive.google.com/file/d/"+id+"/preview"

document.getElementById("driveFrame").src=embed

}

/* drawing */

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
let draw=false

canvas.onmousedown=()=>draw=true
canvas.onmouseup=()=>draw=false

canvas.onmousemove=e=>{
if(!draw) return
ctx.fillRect(e.offsetX,e.offsetY,3,3)
}

/* system info */

document.getElementById("info").innerText =
"User Agent: "+navigator.userAgent

</script>

</body>
</html>
