<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starship Portal</title>

<style>

:root{
--bg:#111;
--card:#1e1e1e;
--accent:#4da3ff;
--text:white;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--text);
}

header{
background:black;
padding:16px;
font-size:24px;
text-align:center;
font-weight:bold;
}

nav{
display:flex;
gap:10px;
padding:10px;
background:#1a1a1a;
justify-content:center;
flex-wrap:wrap;
}

button{
background:#333;
border:none;
color:white;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#555;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:10px;
text-align:center;
}

.card iframe{
width:100%;
height:150px;
border:none;
}

input{
padding:10px;
border-radius:6px;
border:none;
width:250px;
}

video{
max-width:100%;
border-radius:10px;
}

</style>

</head>
<body>

<header>🚀 Starship Portal</header>

<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('games')">Games</button>
<button onclick="showPage('tv')">TV</button>
<button onclick="showPage('search')">Search</button>
<button onclick="showPage('profile')">Profile</button>
<button onclick="showPage('settings')">Settings</button>

</nav>

<!-- HOME -->

<div id="home" class="page active">

<h2>Welcome</h2>
<p>Your all-in-one web portal.</p>

<div class="grid">

<div class="card">
<h3>🎮 Games</h3>
<p>Play browser games</p>
<button onclick="showPage('games')">Open</button>
</div>

<div class="card">
<h3>📺 TV</h3>
<p>Watch videos</p>
<button onclick="showPage('tv')">Open</button>
</div>

<div class="card">
<h3>🔎 Search</h3>
<p>Search the web</p>
<button onclick="showPage('search')">Open</button>
</div>

</div>

</div>

<!-- GAMES -->

<div id="games" class="page">

<h2>🎮 Games</h2>

<div class="grid">

<div class="card">
<h3>Tetris</h3>
<iframe src="https://tetris.com/play-tetris"></iframe>
</div>

<div class="card">
<h3>Pacman</h3>
<iframe src="https://freepacman.org"></iframe>
</div>

<div class="card">
<h3>Snake</h3>
<iframe src="https://playsnake.org"></iframe>
</div>

</div>

</div>

<!-- TV -->

<div id="tv" class="page">

<h2>📺 Video Player</h2>

<video controls>

<source src="" type="video/mp4">

</video>

<p>You can add your own videos by editing the source.</p>

</div>

<!-- SEARCH -->

<div id="search" class="page">

<h2>🔎 Search</h2>

<input id="searchInput" placeholder="Search Google">

<button onclick="doSearch()">Search</button>

</div>

<!-- PROFILE -->

<div id="profile" class="page">

<h2>👤 Profile</h2>

<input id="nameInput" placeholder="Enter your name">

<button onclick="saveProfile()">Save</button>

<p id="profileName"></p>

</div>

<!-- SETTINGS -->

<div id="settings" class="page">

<h2>⚙️ Settings</h2>

<button onclick="toggleTheme()">Toggle Dark / Light</button>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
})

document.getElementById(page).classList.add("active")

}

function doSearch(){

let q=document.getElementById("searchInput").value

window.open("https://www.google.com/search?q="+encodeURIComponent(q))

}

function saveProfile(){

let name=document.getElementById("nameInput").value

localStorage.setItem("starshipName",name)

loadProfile()

}

function loadProfile(){

let name=localStorage.getItem("starshipName")

if(name){

document.getElementById("profileName").innerText="Hello "+name

}

}

function toggleTheme(){

let root=document.documentElement

if(root.style.getPropertyValue("--bg")=="white"){

root.style.setProperty("--bg","#111")
root.style.setProperty("--text","white")

}else{

root.style.setProperty("--bg","white")
root.style.setProperty("--text","black")

}

}

loadProfile()

</script>

</body>
</html
