<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Docs</title> <link id="favicon" rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_wall_google_doc_svg.svg">
    <style>
        :root { --bg: #0a0a0c; --card: #16161e; --accent: #7289da; --text: #ececed; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Technique: Navbar with Active Search */
        nav { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; background: var(--card); border-bottom: 1px solid #2d2d3a; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); cursor: pointer; }
        .search-container { flex: 0.6; position: relative; }
        .search-container input { width: 100%; padding: 10px 20px; border-radius: 20px; border: 1px solid #2d2d3a; background: #050507; color: white; outline: none; }

        /* Technique: The "Hero" Layout */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        /* Technique: Hover Scaling & Glowing */
        .game-card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(114, 137, 218, 0.2); }
        .game-thumb { width: 100%; aspect-ratio: 1; background: #23232f; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .game-info { padding: 12px; text-align: center; font-weight: 600; font-size: 0.9rem; }

        /* Technique: Hidden Panic Overlay */
        #panic-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; }
    </style>
</head>
<body>

<div id="panic-overlay"></div>

<nav>
    <div class="logo" onclick="location.reload()">SHADOW V3</div>
    <div class="search-container">
        <input type="text" id="gameSearch" placeholder="Search games or Enter URL..." onkeyup="filter()">
    </div>
    <div class="settings">
        <button onclick="cloak()" style="background:none; border:1px solid #444; color:white; cursor:pointer; border-radius:5px;">Cloak Tab</button>
    </div>
</nav>

<div class="container">
    <div class="grid" id="gameGrid">
        </div>
</div>

<script>
    // Technique: Local Library with Proxied URLs
    const games = [
        { name: "1v1.LOL", id: "1v1lol", url: "https://1v1.lol/", icon: "🔫" },
        { name: "Slope", id: "slope", url: "https://kbhgames.com/game/slope", icon: "🏂" },
        { name: "Minecraft", id: "mc", url: "https://classic.minecraft.net/", icon: "⛏️" }
    ];

    function render(list) {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = list.map(g => `
            <div class="game-card" onclick="launch('${g.url}')">
                <div class="game-thumb">${g.icon}</div>
                <div class="game-info">${g.name}</div>
            </div>
        `).join('');
    }

    // Technique: About:Blank Cloaking
    function launch(url) {
        const proxyUrl = window.location.origin + `/p?url=${encodeURIComponent(url)}`;
        const win = window.open();
        win.document.body.style.margin = '0';
        win.document.body.style.height = '100vh';
        const iframe = win.document.createElement('iframe');
        iframe.style.border = 'none';
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.src = proxyUrl;
        win.document.body.appendChild(iframe);
    }

    // Technique: Tab Cloaking
    function cloak() {
        document.title = "Google Drive";
        document.getElementById('favicon').href = "https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png";
    }

    // Technique: Panic Key (Hit 'P')
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'p') {
            window.location.href = "https://classroom.google.com";
        }
    });

    function filter() {
        const val = document.getElementById('gameSearch').value.toLowerCase();
        render(games.filter(g => g.name.toLowerCase().includes(val)));
    }

    render(games);
</script>
</body>
</html>
